spring.application.name=course
server.port=${SERVER_PORT:8080}

# PostgreSQL Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5434/coursedb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password123}

# JPA - schema is managed by Flyway, Hibernate only validates
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# Set FLYWAY_BASELINE_ON_MIGRATE=true (once) if pointing at a pre-existing DB created by ddl-auto
spring.flyway.baseline-on-migrate=${FLYWAY_BASELINE_ON_MIGRATE:false}
# Optional: isolate this app in its own schema when sharing a Postgres instance
spring.flyway.create-schemas=true
spring.flyway.default-schema=${DB_SCHEMA:public}
spring.jpa.properties.hibernate.default_schema=${DB_SCHEMA:public}

# JWT
app.jwt.secret=${JWT_SECRET:S3cur3SuperLongSecretKeyForEduTrackApp2024!MustBe32CharsMin}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# CORS (comma-separated origins)
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://anastasia.course.bsf.md,http://localhost:5174,http://localhost:8081}

# Swagger / OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.operationsSorter=method
